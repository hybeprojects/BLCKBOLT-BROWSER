name: Release BLCKBOLT-BROWSER

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Install Wine32 for Windows builds on Linux
      - name: Install Wine32 (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine32:i386 xvfb

      # 5. Build the Electron app
      - name: Build Electron App
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            npx electron-builder --linux
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            npx electron-builder --win --publish never --config.extraMetadata.build.win.certificateSubjectName=""
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            npx electron-builder --mac
          fi

      # 6. Upload build artifacts temporarily
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: BLCKBOLT-BROWSER-${{ matrix.os }}
          path: dist/**/*

  release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      # 1. Download all artifacts from build job
      - name: Download Artifacts
        uses: actions/download-artifact@v3
        with:
          path: release-builds

      # 2. Create GitHub Release
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: BLCKBOLT-BROWSER ${{ github.ref_name }}
          body: |
            BLCKBOLT-BROWSER pre-built binaries for Linux, Windows, and macOS.
            This release includes:
            - Linux: .AppImage, .deb
            - Windows: .exe (unsigned)
            - macOS: .dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Upload artifacts to release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: release-builds/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
