name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v0.1.0)'
        required: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact: BLCKBOLT-Browser-*.AppImage,BLCKBOLT-Browser-*.deb
            artifact_name: Linux
          - os: windows-latest
            artifact: BLCKBOLT-Browser-Setup-*.exe,BLCKBOLT Browser.exe,BLCKBOLT Browser-*.zip
            artifact_name: Windows
          - os: macos-latest
            artifact: BLCKBOLT Browser-*.dmg,BLCKBOLT Browser-*.zip
            artifact_name: macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build renderer
        run: npm run build:renderer

      - name: Build ${{ matrix.artifact_name }}
        run: npm run build:prod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact_name }}-artifacts
          path: dist/
          retention-days: 5

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          draft: false
          prerelease: false
          body: |
            BLCKBOLT Browser Release ${{ github.ref_name }}
            
            ## Download
            
            - **Windows**: Download the installer (Setup) or portable EXE
            - **Linux**: Download AppImage (universal) or DEB (Ubuntu/Debian)
            - **macOS**: Download DMG
            
            ## Installation
            
            ### Windows
            - Installer: Double-click BLCKBOLT-Browser-Setup-*.exe
            - Portable: Extract ZIP and run BLCKBOLT Browser.exe
            
            ### Linux (AppImage)
            ```bash
            chmod +x BLCKBOLT-Browser-*.AppImage
            ./BLCKBOLT-Browser-*.AppImage
            ```
            
            ### Linux (DEB)
            ```bash
            sudo apt install ./BLCKBOLT-Browser-*.deb
            blckbolt-browser
            ```
            
            ### macOS
            - Mount DMG and drag to Applications
            - Or unzip and move to Applications
            
            ## Features
            
            - 🔒 Advanced privacy controls (WebRTC, DNS-over-HTTPS, Tor)
            - 🛡️ Canvas fingerprint blocking
            - ⚡ Speed test & network metrics
            - 🌐 DPI detection & anti-censorship
            - 🎨 Modern glassmorphic UI
            - ⌨️ Developer-friendly shortcuts
            
            ## System Requirements
            
            - **Windows**: 7 or later (x64, ia32)
            - **Linux**: Ubuntu 18.04+ (x64, arm64)
            - **macOS**: 10.11 or later (x64, arm64)
            
            For more info, visit https://github.com/hybeprojects/BLCKBOLT-BROWSER
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
